d then spending the rest of the essay developing and defending your own position helps readers…", "Claim A claim is a debatable statement or conclusion that answers a research question. It is not an obvious fact but a position that requires support.", "An effective counterargument contains three components: 1. Counterargument State the opposing view fairly and accurately.", "Establishing limits means acknowledging that an argument is not the final or absolute authority on a topic. Writers should recognize the limitations of their findings and admit when further research is needed."], "answerIndex": 1, "explanation": "Claim A claim is a debatable statement or conclusion that answers a research question. It is not an obvious fact but a position that requires support. Evidence Evidence is the data, findings, statistics, observations, or information that supports the claim. Evidence must be relevant, sufficient, and credible. Reasoning Reasoning is the logical explanation that connects the evidence to the claim. It explains why the evidence matters and how it supports the claim. According to the lecture, reasoning is often the most difficult component for graduate students."}, {"week": 6, "topic": "CER Framework, Source Evaluation & Counterarguments", "sourceNum": 3, "question": "Explain the practical application of the CER Framework using the water strider example.", "options": ["Claim A claim is a debatable statement or conclusion that answers a research question. It is not an obvious fact but a position that requires support.", "The lecture explains CER through the example of a water strider standing on water. Claim A water strider is able to stand on water.", "The CER Framework is important for graduate students because it promotes critical thinking and helps them build strong academic arguments. It requires students to support their claims with empirical evidence and…", "The Claim, Evidence, and Reasoning (CER) Framework is a structured approach used to construct s let questions=[...BANK], current=0, answers={};
const $=id=>document.getElementById(id);
function init(){let weeks=[...new Set(BANK.map(q=>q.week))].sort((a,b)=>a-b); weeks.forEach(w=>{let o=document.createElement('option');o.value=w;o.textContent='Week '+w; $('weekFilter').appendChild(o)}); $('weekFilter').onchange=()=>restart(true); restart(true)}
function restart(filterChanged){let f=$('weekFilter').value; questions=BANK.filter(q=>f==='all'||String(q.week)===f); current=0; answers={}; render();}
function shuffleQuestions(){for(let i=questions.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]]}current=0;render()}
function render(){if(!questions.length)return; let q=questions[current]; $('total').textContent=questions.length; $('counter').textContent=`Question ${current+1} / ${questions.length}`; $('weekTag').textContent=`Week ${q.week} · Q${q.sourceNum} · ${q.topic}`; $('question').textContent=q.question; let box=$('options'); box.innerHTML=''; q.options.forEach((op,i)=>{let d=document.createElement('div');d.className='opt';d.textContent=String.fromCharCode(65+i)+'. '+op;d.onclick=()=>choose(i); if(answers[current]!==undefined){d.classList.add('disabled'); if(i===q.answerIndex)d.classList.add('correct'); if(i===answers[current]&&i!==q.answerIndex)d.classList.add('wrong')} box.appendChild(d)}); let fb=$('feedback'); if(answers[current]!==undefined){fb.className='feedback show'; fb.innerHTML=(answers[current]===q.answerIndex?'✅ <b>Correct</b><br>':'❌ <b>Wrong</b><br>')+`<b>Full model answer:</b> ${escapeHtml(q.explanation)}`}else{fb.className='feedback'; fb.innerHTML=''} updateStats(); buildJump();}
function choose(i){if(answers[current]!==undefined)return; answers[current]=i; render()}
function nextQ(){if(current<questions.length-1){current++;render()}}
function prevQ(){if(current>0){current--;render()}}
function updateStats(){let a=Object.keys(answers).length, s=0; for(let k in answers){if(answers[k]===questions[k].answerIndex)s++} $('answered').textContent=a; $('score').textContent=s; $('wrong').textContent=a-s; $('percent').textContent=a?Math.round(s/a*100)+'%':'0%'; $('bar').style.width=(a/questions.length*100)+'%'}
function toggleList(){let p=$('listPanel'); p.style.display=p.style.display==='none'?'block':'none'; buildJump()}
function buildJump(){let list=$('jumpList'); if(!$('listPanel')||$('listPanel').style.display==='none')return; list.innerHTML=''; questions.forEach((q,i)=>{let d=document.createElement('div');d.className='jump'; if(answers[i]!==undefined)d.classList.add(answers[i]===q.answerIndex?'done':'bad'); d.textContent=`${i+1}. Week ${q.week} Q${q.sourceNum}: ${q.question}`; d.onclick=()=>{current=i;render();scrollTo(0,0)}; list.appendChild(d)})}
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
init();
</script>
