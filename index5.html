<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEFL Methods - Study Questions Exam</title>
<style>
:root {
  --bg:#eef2f7; --card:#ffffff; --ink:#172033; --muted:#667085;
  --blue:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef2f7,#f8fafc);color:var(--ink)}
header{background:#111827;color:white;padding:24px 16px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px #0003}
header h1{margin:0;font-size:24px}
header p{margin:8px 0 0;color:#d1d5db}
.wrap{max-width:1050px;margin:0 auto;padding:18px}
.panel{background:var(--card);border-radius:16px;padding:18px;margin:16px 0;box-shadow:0 4px 18px #00000012}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:#f1f5f9;border-radius:12px;padding:12px;text-align:center}
.stat b{display:block;font-size:22px}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
button,select{border:0;border-radius:10px;padding:11px 14px;font-weight:700;font-size:14px}
button{background:var(--blue);color:white;cursor:pointer}
button.secondary{background:#475569}
button.warn{background:var(--amber);color:#111827}
button.danger{background:var(--red)}
select{background:#e2e8f0;color:#111827}
.qcard{background:white;border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 3px 14px #00000012;border:2px solid transparent}
.qtop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.badge{font-size:12px;background:#dbeafe;color:#1e40af;border-radius:999px;padding:5px 9px;font-weight:700;white-space:nowrap}
.qtext{font-size:18px;font-weight:700;line-height:1.5;margin:10px 0 14px}
.option{display:block;padding:12px;margin:8px 0;border:1px solid #d0d5dd;border-radius:12px;background:#f8fafc;cursor:pointer}
.option:hover{background:#eef6ff}
.option input{margin-right:8px}
.correct{border-color:var(--green)!important;background:#dcfce7!important}
.wrong{border-color:var(--red)!important;background:#fee2e2!important}
.explain{display:none;margin-top:10px;font-size:14px;color:#334155}
.qcard.answered .explain{display:block}
#resultBox{display:none;text-align:center}
.score{font-size:42px;font-weight:900}
.pass{color:var(--green)} .fail{color:var(--red)}
.footer{text-align:center;color:#667085;padding:24px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)} header h1{font-size:20px} .qtext{font-size:16px}}
</style>
</head>
<body>
<header>
<h1>TEFL Methods Exam — Study Questions & Answers Only</h1>
<p>MCQ + True / False | Full self-test file | Opens directly in browser</p>
</header>

<div class="wrap">
<div class="panel">
<div class="stats">
<div class="stat"><span>Total Questions</span><b id="total">0</b></div>
<div class="stat"><span>Answered</span><b id="answered">0</b></div>
<div class="stat"><span>Correct</span><b id="correct">0</b></div>
<div class="stat"><span>Wrong</span><b id="wrong">0</b></div>
</div>
</div>

<div class="panel controls">
<select id="filter" onchange="render()">
<option value="All">All Methods</option>
<option value="GTM">GTM</option>
<option value="Direct Method">Direct Method</option>
<option value="ALM">ALM</option>
<option value="Silent Way">Silent Way</option>
<option value="Desuggestopedia">Desuggestopedia</option>
<option value="CLT">CLT</option>
</select>
<button onclick="checkAll()">Submit / Show Score</button>
<button class="secondary" onclick="showAnswers()">Show Answers</button>
<button class="warn" onclick="shuffleQuestions()">Shuffle</button>
<button class="danger" onclick="resetQuiz()">Reset</button>
</div>

<div id="quiz"></div>

<div id="resultBox" class="panel">
<div class="score" id="finalScore"></div>
<p id="finalMsg"></p>
</div>

<div class="footer">Made for quick revision from Study Questions & Answers only.</div>
</div>

M", "q": "The reason for starting from the end in backward build-up drill is to keep:", "opts": ["Translation accurate", "Intonation natural", "Writing neat", "Vocabulary limited"], "a": 1}, {"type": "mcq", "method": "ALM", "q": "A minimal pair consists of two words that differ in:", "opts": ["Only one sound", "Only one paragraph", "Their grammar category only", "Their culture"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "Which is a minimal pair example?", "opts": ["book/table", "ship/sheep", "teacher/classroom", "grammar/translation"], "a": 1}, {"type": "mcq", "method": "ALM", "q": "In ALM, L1 and L2 should be kept apart because:", "opts": ["L1 habits may interfere with L2 acquisition", "Students should never learn culture", "Vocabulary is useless", "Teachers dislike translation only"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "The principle behind repetition in ALM is:", "opts": ["The more repetition, the stronger the habit", "Students must discover rules silently", "Errors are always ignored", "Music creates retention"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "In ALM, students should overlearn so they can:", "opts": ["Answer automatically without thinking", "Translate poems", "Avoid all speaking", "Write essays only"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "Vocabulary in ALM is limited because the major objective is to acquire:", "opts": ["Structural patterns", "Literary appreciation", "Counseling skills", "Native language grammar"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "ALM sees each language as:", "opts": ["A unique system with levels and patterns", "A list of translated words only", "A set of pictures", "A counseling session"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "Culture in ALM is:", "opts": ["Everyday behavior and lifestyle", "Only classical art", "Not related to language", "Only pronunciation"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "Dialogue memorization in ALM involves:", "opts": ["Memorizing dialogues through mimicry", "Silent chart pointing only", "Free debate only", "Reading literature aloud in L1"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "A transformation drill asks students to:", "opts": ["Change one sentence type into another", "Choose a new identity", "Listen to music", "Translate a poem"], "a": 0}, {"type": "mcq", "method": "ALM", "q": "A chain drill forms:", "opts": ["Conversation around the room", "A wall chart", "A grammar essay", "A written translation"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "A major problem with ALM was that students could not easily transfer classroom habits to:", "opts": ["Real communicative use", "Written grammar rules", "Vocabulary lists", "Pronunciation drills"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "Chomsky argued language acquisition cannot be only habit formation because people:", "opts": ["Create and understand novel utterances", "Only repeat memorized dialogues", "Cannot learn grammar", "Need translation"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "Chomsky emphasized:", "opts": ["Rule formation", "Translation only", "Memorization only", "Teacher authority only"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "The Cognitive Code Approach sees learners as:", "opts": ["Active thinkers who formulate hypotheses", "Passive repeaters only", "Translators only", "People who must never make errors"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "In the Cognitive Code Approach, errors are:", "opts": ["Signs of active hypothesis testing", "Always signs of failure", "Never allowed", "Punished immediately"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "'Teaching is subordinated to learning' means:", "opts": ["Teacher action is secondary to learner engagement", "Teacher talks all the time", "Students only translate", "Learning is less important than teaching"], "a": 0}, {"type": "mcq", "method": "Silent Way", "q": "Only the learner can:", "opts": ["Do th let state = {};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function render() {
  const filter = document.getElementById('filter').value;
  const list = questions.filter(q => filter === 'All' || q.method === filter);
  document.getElementById('total').textContent = list.length;
  const box = document.getElementById('quiz');
  box.innerHTML = '';
  list.forEach((q, idx) => {
    const globalIndex = questions.indexOf(q);
    const chosen = state[globalIndex];
    const answered = chosen !== undefined;
    let html = `<div class="qcard ${answered?'answered':''}" id="card_${globalIndex}">
      <div class="qtop"><span class="badge">${q.method} • ${q.type.toUpperCase()}</span><span class="badge">Q${idx+1}</span></div>
      <div class="qtext">${q.q}</div>`;
    if(q.type === 'mcq') {
      q.opts.forEach((op, i) => {
        let cls = '';
        if(answered) {
          if(i === q.a) cls = 'correct';
          else if(i === chosen) cls = 'wrong';
        }
        html += `<label class="option ${cls}"><input type="radio" name="q_${globalIndex}" value="${i}" ${chosen===i?'checked':''} onchange="answer(${globalIndex},${i})"> ${op}</label>`;
      });
      html += `<div class="explain">Correct answer: <b>${q.opts[q.a]}</b></div>`;
    } else {
      [true,false].forEach(val => {
        let text = val ? 'True' : 'False';
        let cls = '';
        if(answered) {
          if(val === q.a) cls = 'correct';
          else if(val === chosen) cls = 'wrong';
        }
        html += `<label class="option ${cls}"><input type="radio" name="q_${globalIndex}" value="${val}" ${chosen===val?'checked':''} onchange="answer(${globalIndex},${val})"> ${text}</label>`;
      });
      html += `<div class="explain">Correct answer: <b>${q.a ? 'True' : 'False'}</b></div>`;
    }
    html += `</div>`;
    box.innerHTML += html;
  });
  updateStats();
}

function answer(i, v) {
  state[i] = v;
  render();
}

function updateStats() {
  let answered=0, correct=0, wrong=0;
  for(const k in state) {
    answered++;
    const q = questions[k];
    if(state[k] === q.a) correct++; else wrong++;
  }
  document.getElementById('answered').textContent = answered;
  document.getElementById('correct').textContent = correct;
  document.getElementById('wrong').textContent = wrong;
}

function checkAll() {
  let total = Object.keys(state).length;
  let correct = 0;
  for(const k in state) if(state[k] === questions[k].a) correct++;
  let percent = total ? Math.round(correct/total*100) : 0;
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('finalScore').innerHTML = `<span class="${percent>=60?'pass':'fail'}">${correct} / ${total} (${percent}%)</span>`;
  document.getElementById('finalMsg').textContent = total === 0 ? 'You have not answered any question yet.' : (percent>=80 ? 'Excellent revision.' : percent>=60 ? 'Acceptable, but review the wrong answers.' : 'Weak result. Repeat the test and focus on missed methods.');
  window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function showAnswers() {
  questions.forEach((q,i)=>{ if(state[i]===undefined) state[i]=q.a; });
  render();
}

function resetQuiz() {
  state = {};
  document.getElementById('resultBox').style.display = 'none';
  render();
}

function shuffleQuestions() {
  shuffle(questions);
  state = {};
  document.getElementById('resultBox').style.display = 'none';
  render();
}

render();
</script>
</body>
</html>
